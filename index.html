<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Temporizador · Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --fg: #f0f0f0;
    --accent: #e8ff00;
    --danger: #ff3c00;
    --mid: #888;
    --border: #222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    user-select: none;
  }

  /* ── PANELES ─────────────────────────────────────────── */
  #panel-left {
    grid-column: 1;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    padding: clamp(1rem, 2vw, 2.5rem);
    padding-top: clamp(1.5rem, 2.5vw, 2rem);
  }

  #panel-right {
    grid-column: 3;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: clamp(1rem, 2vw, 2.5rem);
    padding-top: clamp(1.5rem, 2.5vw, 2rem);
    align-items: flex-end;
  }

  #center {
    grid-column: 2;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
    padding: 1rem 0;
  }

  /* ── MODO LABEL ─────────────────────────────────────── */
  #mode-label {
    font-size: clamp(0.65rem, 1.2vw, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: clamp(1rem, 2vh, 2rem);
    font-weight: 300;
    text-align: center;
  }

  /* ── DISPLAY PRINCIPAL ──────────────────────────────── */
  #display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 22vw, 32rem);
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--fg);
    transition: color 0.3s ease, font-size 0.4s ease;
    text-align: center;
    width: 100%;
  }

  #display.warning { color: var(--accent); animation: pulse-warning 1s ease-in-out infinite; }
  #display.danger  { color: var(--danger);  animation: pulse-danger 0.5s ease-in-out infinite; }
  #display.overtime { color: var(--danger); }

  @keyframes pulse-warning { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  @keyframes pulse-danger  { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── BARRA DE PROGRESO ──────────────────────────────── */
  #progress-track {
    width: min(80%, 700px);
    height: 3px;
    background: var(--border);
    margin-top: clamp(1.5rem, 3vh, 3rem);
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transform-origin: left;
    transition: width 1s linear, background 0.3s ease;
  }

  #progress-bar.warning  { background: var(--accent); }
  #progress-bar.danger   { background: var(--danger); }
  #progress-bar.overtime { background: var(--danger); width: 0% !important; }

  /* ── ESTADO ─────────────────────────────────────────── */
  #status {
    margin-top: clamp(0.8rem, 1.5vh, 1.5rem);
    font-size: clamp(0.65rem, 1vw, 0.9rem);
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    font-weight: 300;
    height: 1em;
    text-align: center;
  }

  /* ── MENSAJE DISPLAY ────────────────────────────────── */
  #message-display {
    display: none;
    margin-top: clamp(1rem, 2vh, 2rem);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 4vw, 3.5rem);
    letter-spacing: 0.1em;
    text-align: center;
    word-break: break-word;
    width: 100%;
    padding: 0 1rem;
  }

  #message-display.visible { display: block; }

  /* ── CONTROLES ──────────────────────────────────────── */
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(0.5rem, 1vw, 1.5rem);
    align-items: center;
    justify-content: center;
    margin-top: clamp(1.5rem, 2.5vh, 2.5rem);
  }

  /* ── INPUT MENSAJE ──────────────────────────────────── */
  #message-area {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    margin-top: clamp(0.8rem, 1.5vh, 1.5rem);
    width: min(90%, 700px);
    flex-wrap: wrap;
    justify-content: center;
  }

  #message-input {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.7rem, 1.2vw, 0.85rem);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 0.5rem 0.8rem;
    flex: 1;
    min-width: 150px;
    outline: none;
    letter-spacing: 0.02em;
    transition: border-color 0.15s ease;
  }

  #message-input::placeholder { color: var(--mid); }
  #message-input:focus { border-color: var(--accent); }

  /* ── BOTONES ────────────────────────────────────────── */
  button {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.6rem, 0.9vw, 0.75rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--mid);
    padding: clamp(0.4rem, 0.8vh, 0.6rem) clamp(0.8rem, 1.5vw, 1.4rem);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  button:hover { border-color: var(--fg); color: var(--fg); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: var(--bg); }

  /* ── CONFIG ─────────────────────────────────────────── */
  #config {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  #config label {
    font-size: clamp(0.55rem, 0.9vw, 0.7rem);
    letter-spacing: 0.15em;
    color: var(--mid);
    text-transform: uppercase;
    font-weight: 400;
  }

  #config input {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.8rem, 1.2vw, 0.95rem);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 0.3rem 0.5rem;
    width: clamp(70px, 8vw, 100px);
    text-align: center;
    outline: none;
  }

  #config input:focus { border-color: var(--accent); }

  /* ── SELECTOR DE MODO + IDIOMA ──────────────────────── */
  #top-right {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 0.6rem;
  }

  #mode-toggle {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .mode-btn { font-size: clamp(0.55rem, 0.9vw, 0.65rem); padding: 0.4rem 0.8rem; white-space: nowrap; }
  .mode-btn.active { border-color: var(--fg); color: var(--fg); }

  /* ── SELECTOR DE IDIOMA ─────────────────────────────── */
  #lang-toggle {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .lang-btn {
    font-size: 0.6rem;
    padding: 0.3rem 0.5rem;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .lang-btn.active { border-color: var(--fg); color: var(--fg); }
  #alerts {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 1.5rem;
    align-items: flex-end;
  }

  #alerts label {
    font-size: clamp(0.55rem, 0.9vw, 0.7rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    text-align: right;
  }

  #alerts label.lbl-warning { color: var(--accent); opacity: 0.8; }
  #alerts label.lbl-danger  { color: var(--danger);  opacity: 0.8; }

  #alerts input {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.8rem, 1.2vw, 0.95rem);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 0.3rem 0.5rem;
    width: clamp(70px, 8vw, 100px);
    text-align: center;
    outline: none;
  }

  #alerts input:focus { border-color: var(--accent); }

  /* ── BANNER TIEMPO CONSUMIDO ────────────────────────── */
  #overtime-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--danger);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 3rem);
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    padding: clamp(0.4rem, 1vh, 0.8rem);
    z-index: 100;
  }

  #overtime-banner.show { display: block; }

  /* ── LEYENDA ATAJOS ─────────────────────────────────── */
  #shortcuts {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: auto;
    opacity: 0.45;
    transition: opacity 0.2s ease;
  }

  #shortcuts:hover { opacity: 0.8; }

  .shortcut {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: clamp(0.5rem, 0.8vw, 0.65rem);
    letter-spacing: 0.05em;
    color: var(--mid);
    font-weight: 400;
  }

  .key {
    border: 1px solid var(--mid);
    border-radius: 3px;
    padding: 0.1rem 0.35rem;
    font-size: clamp(0.5rem, 0.8vw, 0.65rem);
    color: var(--mid);
    line-height: 1.4;
    min-width: 1.6rem;
    text-align: center;
  }

  /* ── BOTÓN MODO LIMPIO ──────────────────────────────── */
  #btn-clean {
    position: fixed;
    bottom: clamp(0.8rem, 1.5vh, 1.5rem);
    right: clamp(0.8rem, 1.5vw, 2rem);
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 0;
    width: 2.2rem;
    height: 2.2rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: none;
    font-weight: 400;
    letter-spacing: 0;
    border-radius: 4px;
    z-index: 200;
  }

  #btn-clean svg { width: 1rem; height: 1rem; fill: currentColor; }
  #btn-clean:hover { opacity: 1; border-color: var(--fg); color: var(--fg); }
  #btn-clean.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

  /* ── MODO LIMPIO ────────────────────────────────────── */
  body.clean #panel-left,
  body.clean #panel-right,
  body.clean #mode-label,
  body.clean #status,
  body.clean #controls,
  body.clean #message-area {
    display: none !important;
  }

  body.clean #center { grid-column: 1 / 4; }
  body.clean #display { font-size: clamp(8rem, 35vw, 48rem); }
  body.clean #progress-track { width: 90%; }

  /* ── RESPONSIVE <500px ──────────────────────────────── */
  @media (max-width: 500px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr auto; overflow-y: auto; }
    #panel-left { grid-column: 1; grid-row: 1; flex-direction: row; flex-wrap: wrap; gap: 1rem; padding: 1rem; border-bottom: 1px solid var(--border); }
    #panel-right { grid-column: 1; grid-row: 2; flex-direction: row; flex-wrap: wrap; align-items: flex-start; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
    #center { grid-column: 1; grid-row: 3; }
    #shortcuts { display: none; }
    #alerts { margin-top: 0; align-items: flex-start; }
    #mode-toggle { flex-direction: row; }
    #lang-toggle { margin-top: 0; padding-top: 0; }
    #display { font-size: clamp(5rem, 28vw, 14rem); }
  }

  /* ── RESPONSIVE 500–900px ───────────────────────────── */
  @media (min-width: 501px) and (max-width: 900px) {
    #display { font-size: clamp(5rem, 20vw, 20rem); }
    #panel-left, #panel-right { padding: clamp(0.8rem, 1.5vw, 1.5rem); }
    #shortcuts { display: none; }
  }
</style>
</head>
<body>

<div id="panel-left">
  <div id="config">
    <label data-i18n="minutes">Minutos</label>
    <input type="number" id="input-minutes" value="5" min="0" max="99">
    <label style="margin-top:0.3rem" data-i18n="seconds">Segundos</label>
    <input type="number" id="input-seconds" value="0" min="0" max="59">
  </div>
  <div id="shortcuts">
    <div class="shortcut"><span class="key">Space</span> <span data-i18n="sc-startstop">iniciar / pausar</span></div>
    <div class="shortcut"><span class="key">R</span> <span data-i18n="sc-reset">reset</span></div>
    <div class="shortcut"><span class="key">M</span> <span data-i18n="sc-addmin">+1 min</span></div>
    <div class="shortcut"><span class="key">S</span> <span data-i18n="sc-sub30">−30 seg</span></div>
    <div class="shortcut"><span class="key">C</span> <span data-i18n="sc-clean">modo limpio</span></div>
  </div>
</div>

<div id="center">
  <div id="mode-label">CUENTA ATRÁS</div>
  <div id="display">05:00</div>
  <div id="progress-track"><div id="progress-bar"></div></div>
  <div id="status"></div>
  <div id="message-display"></div>
  <div id="controls">
    <button onclick="resetTimer()" data-i18n="btn-reset">Reset</button>
    <button class="primary" id="btn-startstop" onclick="toggleTimer()"></button>
    <button id="btn-pause" onclick="pauseTimer()" style="display:none" data-i18n="btn-pause"></button>
    <button onclick="subtractThirty()" data-i18n="btn-sub30">−30 seg</button>
    <button onclick="addMinute()" data-i18n="btn-addmin">+1 min</button>
  </div>
  <div id="message-area">
    <input type="text" id="message-input">
    <button onclick="sendMessage()" data-i18n="btn-send"></button>
    <button onclick="clearMessage()" data-i18n="btn-clear"></button>
  </div>
</div>

<div id="panel-right">
  <div id="top-right">
    <div id="mode-toggle">
      <button class="mode-btn active" onclick="setMode('countdown')" id="btn-countdown" data-i18n="mode-countdown">Cuenta atrás</button>
      <button class="mode-btn" onclick="setMode('countup')" id="btn-countup" data-i18n="mode-countup">Cuenta adelante</button>
    </div>
    <div id="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')" id="btn-lang-es">ES</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-lang-en">EN</button>
    </div>
  </div>
  <div id="alerts">
    <label class="lbl-warning" data-i18n="alert-warning">Alerta amarilla (min)</label>
    <input type="number" id="input-warning" value="3" min="0" max="99">
    <label class="lbl-danger" style="margin-top:0.5rem" data-i18n="alert-danger">Alerta roja (min)</label>
    <input type="number" id="input-danger" value="1" min="0" max="99">
  </div>
</div>

<div id="overtime-banner"></div>

<button id="btn-clean" onclick="toggleClean()">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 3h7v2H5v5H3V3zm11 0h7v7h-2V5h-5V3zM3 14h2v5h5v2H3v-7zm16 5h-5v2h7v-7h-2v5z"/>
  </svg>
</button>

<script>
  // ── TRADUCCIONES ──────────────────────────────────────
  const i18n = {
    es: {
      'minutes':       'Minutos',
      'seconds':       'Segundos',
      'mode-countdown':'Cuenta atrás',
      'mode-countup':  'Cuenta adelante',
      'alert-warning': 'Alerta amarilla (min)',
      'alert-danger':  'Alerta roja (min)',
      'btn-reset':     'Reset',
      'btn-pause':     'Pausar',
      'btn-sub30':     '−30 seg',
      'btn-addmin':    '+1 min',
      'btn-send':      'Enviar',
      'btn-clear':     'Borrar',
      'sc-startstop':  'iniciar / pausar',
      'sc-reset':      'reset',
      'sc-addmin':     '+1 min',
      'sc-sub30':      '−30 seg',
      'sc-clean':      'modo limpio',
      'label-countdown':'CUENTA ATRÁS',
      'label-countup': 'CUENTA ADELANTE',
      'status-ready':  'listo',
      'status-running':'en curso',
      'status-paused': 'pausado',
      'status-overtime':'tiempo consumido',
      'btn-start':     'Iniciar',
      'btn-resume':    'Reanudar',
      'overtime-msg':  '⚠ tiempo consumido',
      'placeholder-msg':'Mensaje al ponente… (Enter para enviar, Esc para borrar)',
      'clean-title':   'Modo limpio (C)',
    },
    en: {
      'minutes':       'Minutes',
      'seconds':       'Seconds',
      'mode-countdown':'Countdown',
      'mode-countup':  'Count up',
      'alert-warning': 'Yellow alert (min)',
      'alert-danger':  'Red alert (min)',
      'btn-reset':     'Reset',
      'btn-pause':     'Pause',
      'btn-sub30':     '−30 sec',
      'btn-addmin':    '+1 min',
      'btn-send':      'Send',
      'btn-clear':     'Clear',
      'sc-startstop':  'start / pause',
      'sc-reset':      'reset',
      'sc-addmin':     '+1 min',
      'sc-sub30':      '−30 sec',
      'sc-clean':      'clean mode',
      'label-countdown':'COUNTDOWN',
      'label-countup': 'COUNT UP',
      'status-ready':  'ready',
      'status-running':'running',
      'status-paused': 'paused',
      'status-overtime':'time over',
      'btn-start':     'Start',
      'btn-resume':    'Resume',
      'overtime-msg':  '⚠ time over',
      'placeholder-msg':'Message to speaker… (Enter to send, Esc to clear)',
      'clean-title':   'Clean mode (C)',
    }
  };

  let lang = 'es';

  function setLang(l) {
    lang = l;
    document.getElementById('btn-lang-es').classList.toggle('active', l === 'es');
    document.getElementById('btn-lang-en').classList.toggle('active', l === 'en');
    document.documentElement.lang = l;

    // Actualizar todos los elementos con data-i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[l][key]) el.textContent = i18n[l][key];
    });

    // Elementos dinámicos que dependen del estado actual
    document.getElementById('message-input').placeholder = i18n[l]['placeholder-msg'];
    document.getElementById('btn-clean').title = i18n[l]['clean-title'];
    overtimeBanner.textContent = i18n[l]['overtime-msg'];

    // Etiqueta del modo actual
    modeLabel.textContent = i18n[l][mode === 'countdown' ? 'label-countdown' : 'label-countup'];

    // Estado actual
    const statusKey = running ? 'status-running'
      : elapsed > 0 ? 'status-paused'
      : 'status-ready';
    if (totalSeconds - elapsed < 0 && mode === 'countdown') {
      statusEl.textContent = i18n[l]['status-overtime'];
    } else {
      statusEl.textContent = i18n[l][statusKey];
    }

    // Botón start/resume
    btnStart.textContent = elapsed === 0 || !running
      ? (elapsed === 0 ? i18n[l]['btn-start'] : i18n[l]['btn-resume'])
      : i18n[l]['btn-resume'];

    document.getElementById('btn-pause').textContent = i18n[l]['btn-pause'];
  }

  // ── ESTADO ────────────────────────────────────────────
  let mode = 'countdown';
  let running = false;
  let interval = null;
  let elapsed = 0;
  let totalSeconds = 300;
  let cleanMode = false;

  const display        = document.getElementById('display');
  const statusEl       = document.getElementById('status');
  const progressBar    = document.getElementById('progress-bar');
  const btnStart       = document.getElementById('btn-startstop');
  const modeLabel      = document.getElementById('mode-label');
  const overtimeBanner = document.getElementById('overtime-banner');
  const messageDisplay = document.getElementById('message-display');
  const inputMin       = document.getElementById('input-minutes');
  const inputSec       = document.getElementById('input-seconds');
  const btnClean       = document.getElementById('btn-clean');

  function t(key) { return i18n[lang][key] || key; }

  function fmt(s) {
    const m = Math.floor(Math.abs(s) / 60);
    const sec = Math.abs(s) % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function toggleClean() {
    cleanMode = !cleanMode;
    document.body.classList.toggle('clean', cleanMode);
    btnClean.classList.toggle('active', cleanMode);
  }

  function setMode(m) {
    if (running) return;
    mode = m;
    document.getElementById('btn-countdown').classList.toggle('active', m === 'countdown');
    document.getElementById('btn-countup').classList.toggle('active', m === 'countup');
    modeLabel.textContent = t(m === 'countdown' ? 'label-countdown' : 'label-countup');
    document.getElementById('config').style.opacity = m === 'countdown' ? '1' : '0.3';
    resetTimer();
  }

  function updateDisplay() {
    if (mode === 'countdown') {
      const remaining = totalSeconds - elapsed;
      display.textContent = remaining < 0 ? '−' + fmt(Math.abs(remaining)) : fmt(remaining);
      const pct = Math.max(0, (remaining / totalSeconds) * 100);
      progressBar.style.width = pct + '%';

      const warningSeconds = (parseInt(document.getElementById('input-warning').value) || 3) * 60;
      const dangerSeconds  = (parseInt(document.getElementById('input-danger').value)  || 1) * 60;

      if (remaining < 0) {
        display.className = 'overtime';
        progressBar.className = 'overtime';
        overtimeBanner.classList.add('show');
        statusEl.textContent = t('status-overtime');
      } else if (remaining <= dangerSeconds) {
        display.className = 'danger';
        progressBar.className = 'danger';
        overtimeBanner.classList.remove('show');
      } else if (remaining <= warningSeconds) {
        display.className = 'warning';
        progressBar.className = 'warning';
        overtimeBanner.classList.remove('show');
      } else {
        display.className = '';
        progressBar.className = '';
        overtimeBanner.classList.remove('show');
      }
    } else {
      display.textContent = fmt(elapsed);
      progressBar.style.width = '100%';
      display.className = '';
      overtimeBanner.classList.remove('show');
    }
  }

  function toggleTimer() {
    if (!running) {
      if (mode === 'countdown' && elapsed === 0) {
        const m = parseInt(inputMin.value) || 0;
        const s = parseInt(inputSec.value) || 0;
        totalSeconds = m * 60 + s || 300;
      }
      running = true;
      btnStart.textContent = t('btn-resume');
      btnStart.classList.remove('primary');
      document.getElementById('btn-pause').style.display = 'inline-block';
      statusEl.textContent = t('status-running');
      interval = setInterval(() => { elapsed++; updateDisplay(); }, 1000);
    }
  }

  function pauseTimer() {
    if (running) {
      running = false;
      clearInterval(interval);
      document.getElementById('btn-pause').style.display = 'none';
      btnStart.textContent = t('btn-resume');
      btnStart.classList.add('primary');
      statusEl.textContent = t('status-paused');
    }
  }

  function addMinute() {
    if (mode === 'countdown') { totalSeconds += 60; updateDisplay(); }
  }

  function subtractThirty() {
    if (mode === 'countdown') {
      totalSeconds = Math.max(elapsed + 1, totalSeconds - 30);
      updateDisplay();
    }
  }

  function resetTimer() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    overtimeBanner.classList.remove('show');
    btnStart.textContent = t('btn-start');
    btnStart.classList.add('primary');
    document.getElementById('btn-pause').style.display = 'none';
    statusEl.textContent = t('status-ready');
    display.className = '';
    progressBar.className = '';

    if (mode === 'countdown') {
      const m = parseInt(inputMin.value) || 0;
      const s = parseInt(inputSec.value) || 0;
      totalSeconds = m * 60 + s || 300;
      display.textContent = fmt(totalSeconds);
      progressBar.style.width = '100%';
    } else {
      display.textContent = '00:00';
      progressBar.style.width = '100%';
    }
  }

  function sendMessage() {
    const msgInput = document.getElementById('message-input');
    const text = msgInput.value.trim();
    if (!text) return;
    messageDisplay.textContent = text;
    messageDisplay.classList.add('visible');
  }

  function clearMessage() {
    document.getElementById('message-input').value = '';
    messageDisplay.textContent = '';
    messageDisplay.classList.remove('visible');
  }

  function handleURLParams() {
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    const m      = params.get('minutes');
    const s      = params.get('seconds');
    const modeP  = params.get('mode');
    const langP  = params.get('lang');

    if (langP && i18n[langP]) setLang(langP);
    if (modeP) setMode(modeP);
    if (m) inputMin.value = m;
    if (s) inputSec.value = s;

    if (action === 'start')          { if (!running) toggleTimer(); }
    if (action === 'pause')          { if (running)  pauseTimer(); }
    if (action === 'reset')          resetTimer();
    if (action === 'addminute')      addMinute();
    if (action === 'subtractthirty') subtractThirty();
  }

  document.getElementById('message-input').addEventListener('keydown', e => {
    if (e.code === 'Enter')  { e.preventDefault(); sendMessage(); }
    if (e.code === 'Escape') { e.preventDefault(); clearMessage(); }
    e.stopPropagation();
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running ? pauseTimer() : toggleTimer(); }
    if (e.code === 'KeyR')  resetTimer();
    if (e.code === 'KeyM')  addMinute();
    if (e.code === 'KeyS')  subtractThirty();
    if (e.code === 'KeyC')  toggleClean();
  });

  // ── INIT ──────────────────────────────────────────────
  setLang('es');
  resetTimer();
  handleURLParams();

  inputMin.addEventListener('input', () => { if (!running) resetTimer(); });
  inputSec.addEventListener('input', () => { if (!running) resetTimer(); });
</script>
</body>
</html>
